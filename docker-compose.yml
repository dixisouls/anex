# Redis 8 ships the query engine and vector search in core (no redis-stack image
# needed). Postgres 16 is the durable system of record. Redis holds projections
# (vector index, leaderboard, the market:feed stream) rebuildable from Postgres.
#
#   docker compose up -d postgres redis           # start the datastores
#   docker compose run --rm migrate               # alembic upgrade head
#
# Seeding uses real GCP embeddings by default (gemini-embedding-001 @ 768 dims).
# The container has no ADC unless you mount credentials — prefer host seeding:
#   export GCP_PROJECT=your-gcp-project-id GCP_LOCATION=global
#   alembic upgrade head
#   python -m backend.market.seeder
#   python -m tests.0001_init
#
# To seed inside compose, mount ADC (see seeder volumes) or set EMBEDDINGS_FAKE=1
# only for offline smoke runs (vectors will not match a host-seeded index).
#   docker compose run --rm seeder
#   docker compose run --rm seeder python -m tests.0001_init
#
# Offline unit tests only: EMBEDDINGS_FAKE=1 pytest tests/0003_agent_loop.py -v
#
# migrate, seeder, and api are under profiles so "docker compose up" only starts
# the datastores. Start the API with: docker compose --profile api up -d api

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bazaar
      POSTGRES_PASSWORD: bazaar
      POSTGRES_DB: bazaar
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bazaar"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "no", "--save", "60", "1"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  migrate:
    build: .
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://bazaar:bazaar@postgres:5432/bazaar
    command: ["alembic", "upgrade", "head"]

  seeder:
    build: .
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://bazaar:bazaar@postgres:5432/bazaar
      REDIS_URL: redis://redis:6379
      GCP_PROJECT: ${GCP_PROJECT}
      GCP_LOCATION: ${GCP_LOCATION:-global}
      GCP_EMBED_MODEL: ${GCP_EMBED_MODEL:-gemini-embedding-001}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/adc.json
    volumes:
      # Optional: mount host ADC so embed_content works in the container.
      - ${GOOGLE_APPLICATION_CREDENTIALS:-${HOME}/.config/gcloud/application_default_credentials.json}:/tmp/adc.json:ro
    command: ["python", "-m", "backend.market.seeder"]

  api:
    build: .
    profiles: ["api"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bazaar:bazaar@postgres:5432/bazaar
      REDIS_URL: redis://redis:6379
      RUNTIME_ENV: local
      GCP_PROJECT: ${GCP_PROJECT}
      GCP_LOCATION: ${GCP_LOCATION:-global}
      GCP_EMBED_MODEL: ${GCP_EMBED_MODEL:-gemini-embedding-001}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/adc.json
      WEAVE_DISABLED: "1"
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-${HOME}/.config/gcloud/application_default_credentials.json}:/tmp/adc.json:ro
    command: ["uvicorn", "backend.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
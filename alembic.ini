# Alembic configuration. The database URL is not set here; env.py reads it from
# DATABASE_URL so the same config works locally and in Docker.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# sqlalchemy.url is intentionally left blank. See alembic/env.py.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S